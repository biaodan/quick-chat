<!DOCTYPE html>
<html lang="es-CO">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto Directo</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #f4f7f6;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        .container { text-align: center; padding: 30px; }
        h1 { color: #2c3e50; font-size: 26px; margin-bottom: 40px; }
        .btn {
            display: inline-block;
            background-color: #25d366;
            color: white;
            padding: 20px 45px;
            font-size: 20px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 50px;
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.4);
            transition: transform 0.3s ease;
        }
        .btn:hover { transform: scale(1.08); }
    </style>
</head>
<body>
    <div class="container">
        <h1>¡Hola! ¿En qué podemos ayudarte hoy?</h1>
        <!-- 这里预埋了你的分流链接 -->
        <a href="https://lihi2.me/bOcYI" class="btn">Chatea con nosotros</a>
    </div>
</body>
</html>
